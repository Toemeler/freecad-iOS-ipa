name: Build FreeCAD iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build FreeCAD (iOS headless)
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version
          cmake --version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Download BeeWare Python 3.13 iOS framework
        run: |
          curl -L -o python-ios.tar.gz \
            https://github.com/beeware/Python-Apple-support/releases/download/3.13-b14/Python-3.13-iOS-support.b14.tar.gz
          mkdir -p python-ios
          tar xzf python-ios.tar.gz -C python-ios
          find python-ios -name "Python.framework" | head -5

      - name: Cache OCCT static build
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: occt-install
          key: occt-ios-arm64-static-v4

      - name: Download OCCT source tarball
        if: steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o occt.tgz \
            https://github.com/Open-Cascade-SAS/OCCT/archive/refs/tags/V7_8_1.tar.gz
          tar xzf occt.tgz
          mv OCCT-7_8_1 occt-src
          echo "OCCT source ready"

      - name: Configure OCCT for iOS arm64
        if: steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p occt-build occt-install
          cmake -S occt-src -B occt-build \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="$SDK" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/occt-install \
            -DBUILD_LIBRARY_TYPE=Static \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_Visualization=OFF \
            -DBUILD_MODULE_ApplicationFramework=OFF \
            -DBUILD_MODULE_DataExchange=OFF \
            -DBUILD_MODULE_ModelingAlgorithms=ON \
            -DBUILD_MODULE_ModelingData=ON \
            -DBUILD_MODULE_FoundationClasses=ON \
            -DUSE_FREETYPE=OFF \
            -DUSE_TK=OFF \
            -DUSE_TCL=OFF \
            2>&1 | tee occt-configure.log

      - name: Build OCCT
        if: steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          cmake --build occt-build --config Release --parallel 3 \
            2>&1 | tee occt-build.log
          cmake --install occt-build --config Release
          echo "OCCT libs: $(ls occt-install/lib/*.a 2>/dev/null | wc -l)"

      - name: Clone FreeCAD
        run: |
          git clone --depth 1 https://github.com/FreeCAD/FreeCAD.git freecad

      - name: Configure FreeCAD (App + Base only, headless)
        run: |
          set -o pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          PY_FW=$(find $(pwd)/python-ios -name "Python.framework" -path "*iphoneos*" | head -1)
          echo "Python framework: $PY_FW"
          cmake -S freecad -B freecad-build \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="$SDK" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DBUILD_GUI=OFF \
            -DBUILD_PART=OFF \
            -DBUILD_MESH=OFF \
            -DBUILD_FEM=OFF \
            -DBUILD_SKETCHER=OFF \
            -DBUILD_DRAFT=OFF \
            -DBUILD_BIM=OFF \
            -DBUILD_ADDONMGR=OFF \
            -DBUILD_CAM=OFF \
            -DBUILD_ASSEMBLY=OFF \
            -DBUILD_SPREADSHEET=OFF \
            -DBUILD_TECHDRAW=OFF \
            -DBUILD_SURFACE=OFF \
            -DBUILD_REVERSEENGINEERING=OFF \
            -DBUILD_ROBOT=OFF \
            -DBUILD_INSPECTION=OFF \
            -DBUILD_OPENSCAD=OFF \
            -DBUILD_MATERIAL=OFF \
            -DBUILD_HELP=OFF \
            -DBUILD_START=OFF \
            -DBUILD_WEB=OFF \
            -DBUILD_TEST=OFF \
            -DBUILD_CLOUD=OFF \
            -DENABLE_DEVELOPER_TESTS=OFF \
            -DPython3_FRAMEWORK="$PY_FW" \
            -DOCC_INCLUDE_DIR=$(pwd)/occt-install/include/opencascade \
            -DOCC_LIBRARY_DIR=$(pwd)/occt-install/lib \
            2>&1 | tee configure.log

      - name: Build FreeCAD
        run: |
          set -o pipefail
          cmake --build freecad-build --config Release --parallel 3 \
            2>&1 | tee build.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            configure.log
            build.log
            occt-configure.log
            occt-build.log
            freecad-build/CMakeFiles/CMakeError.log
            freecad-build/CMakeCache.txt
            occt-build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
