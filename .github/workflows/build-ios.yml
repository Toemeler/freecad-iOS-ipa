name: Build FreeCAD iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build FreeCAD (iOS headless)
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version
          cmake --version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Clone FreeCAD
        run: |
          git clone --depth 1 https://github.com/FreeCAD/FreeCAD.git freecad

      - name: Configure (headless, iOS arm64, no GUI)
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          cmake -S freecad -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="$SDK" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DFREECAD_BUILD_GUI=OFF \
            2>&1 | tee configure.log

      - name: Build
        run: |
          cmake --build build --config Release \
            -- -sdk iphoneos -arch arm64 -jobs 3 -quiet \
            2>&1 | tee build.log

      - name: Upload logs and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            configure.log
            build.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
