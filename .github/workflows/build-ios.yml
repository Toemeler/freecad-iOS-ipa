name: Build FreeCAD iOS Headless

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build FreeCAD headless for iOS arm64
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: System info
        run: |
          sw_vers
          xcodebuild -version
          cmake --version
          python3 --version

      - name: Clone FreeCAD
        run: |
          git clone --depth 1 https://github.com/FreeCAD/FreeCAD.git freecad

      - name: Install host tools (brew)
        run: |
          brew install cmake ninja xerces-c boost

      - name: Cache OCCT iOS build
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: occt-ios
          key: occt-ios-arm64-7.8.1-v2

      - name: Download and build OCCT for iOS arm64
        if: steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          # Download OCCT source
          curl -L -o occt.tgz \
            "https://github.com/Open-Cascade-SAS/OCCT/archive/refs/tags/V7_8_1.tar.gz"
          tar xzf occt.tgz
          OCCT_SRC="OCCT-7_8_1"

          mkdir -p occt-build occt-ios
          cmake -S "$OCCT_SRC" -B occt-build -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path) \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/occt-ios \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DBUILD_LIBRARY_TYPE=Static \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_Visualization=OFF \
            -DBUILD_MODULE_ApplicationFramework=OFF \
            -DBUILD_MODULE_DataExchange=ON \
            -DBUILD_MODULE_ModelingAlgorithms=ON \
            -DBUILD_MODULE_ModelingData=ON \
            -DBUILD_MODULE_FoundationClasses=ON \
            -DUSE_FREETYPE=OFF \
            -DUSE_OPENGL=OFF \
            -DUSE_GLES2=OFF \
            2>&1 | tee occt-configure.log
          cmake --build occt-build --config Release -j3 2>&1 | tee occt-build.log
          cmake --install occt-build
          echo "OCCT installed: $(ls occt-ios/lib/*.a 2>/dev/null | wc -l) static libs"

      - name: Configure FreeCAD headless for iOS
        run: |
          mkdir -p freecad-build
          cmake -S freecad -B freecad-build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path) \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="" \
            -DOCC_INCLUDE_DIR=$(pwd)/occt-ios/include/opencascade \
            -DOCC_LIBRARY_DIR=$(pwd)/occt-ios/lib \
            -DBUILD_GUI=OFF \
            -DBUILD_PART=ON \
            -DBUILD_IMPORT=ON \
            -DBUILD_SKETCHER=OFF \
            -DBUILD_FEM=OFF \
            -DBUILD_MESH=OFF \
            -DBUILD_MESH_PART=OFF \
            -DBUILD_FLAT_MESH=OFF \
            -DBUILD_ADDONMGR=OFF \
            -DBUILD_BIM=OFF \
            -DBUILD_DRAFT=OFF \
            -DBUILD_HELP=OFF \
            -DBUILD_INSPECTION=OFF \
            -DBUILD_MATERIAL=OFF \
            -DBUILD_OPENSCAD=OFF \
            -DBUILD_PART_DESIGN=OFF \
            -DBUILD_CAM=OFF \
            -DBUILD_ASSEMBLY=OFF \
            -DBUILD_PLOT=OFF \
            -DBUILD_POINTS=OFF \
            -DBUILD_REVERSEENGINEERING=OFF \
            -DBUILD_ROBOT=OFF \
            -DBUILD_SHOW=OFF \
            -DBUILD_SPREADSHEET=OFF \
            -DBUILD_START=OFF \
            -DBUILD_TEST=OFF \
            -DBUILD_MEASURE=OFF \
            -DBUILD_TECHDRAW=OFF \
            -DBUILD_SURFACE=OFF \
            -DBUILD_WEB=OFF \
            -DBUILD_CLOUD=OFF \
            -DBUILD_TEMPLATE=OFF \
            -DENABLE_DEVELOPER_TESTS=OFF \
            -DBUILD_DYNAMIC_LINK_PYTHON=OFF \
            -DFREECAD_USE_FREETYPE=OFF \
            -DBUILD_FEM_NETGEN=OFF \
            2>&1 | tee configure.log

      - name: Build FreeCAD headless
        run: |
          cmake --build freecad-build --config Release -- -quiet -jobs 3 2>&1 | tee build.log

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find freecad-build -name "libFreeCADApp*" -o -name "libFreeCADBase*" -o -name "Part.so" \
            | xargs -I{} cp {} dist/ 2>/dev/null || true
          find freecad-build/Release-iphoneos -name "*.a" -exec cp {} dist/ \; 2>/dev/null || true
          ls -lh dist/

      - name: Publish as GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist && zip -r ../freecad-ios-headless.zip . && cd ..
          gh release create "build-${{ github.run_number }}" freecad-ios-headless.zip \
            --repo "${{ github.repository }}" \
            --title "FreeCAD iOS headless build #${{ github.run_number }}" \
            --notes "Headless FreeCAD core (App+Base+Part) for iOS arm64. No GUI. Run ${{ github.run_id }}."

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: |
            configure.log
            build.log
            occt-configure.log
            occt-build.log
            freecad-build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
